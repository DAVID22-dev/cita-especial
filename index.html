<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        /* --- Estilo Base y Colores --- */
        body {
            background-color: #e0f7fa; /* Un fondo celeste suave para que resalte el turquesa */
            color: #333333; /* Texto casi negro, más suave que negro puro */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            padding: 20px;
            margin: 0;
        }

        h1, h2, h3 {
            color: #008B8B; /* Dark Cyan para títulos */
        }

        h1 {
            font-size: 2.5em;
            margin-top: 40px;
        }

        p {
            color: #00796B; /* Un turquesa oscuro para el texto */
            font-size: 1.2em;
        }

        /* --- CONTENEDOR DE TARJETAS (Esto es lo que faltaba) --- */
        .container {
            display: flex; /* Pone las tarjetas una al lado de la otra */
            justify-content: center; /* Centra las tarjetas en la pantalla */
            gap: 25px; /* Espacio entre las tarjetas */
            flex-wrap: wrap; /* Si no caben en celular, se ponen una debajo */
            padding: 20px;
            margin-top: 30px;
        }

        /* --- ESTILO DE CADA TARJETA --- */
        .card {
            background-color: white; /* Tarjeta blanca para que resalte */
            border-radius: 20px; /* Bordes redondeados */
            padding: 15px;
            width: 280px; /* Ancho fijo de la tarjeta */
            box-shadow: 0 8px 15px rgba(0, 139, 139, 0.15); /* Sombra turquesa suave */
            transition: all 0.3s ease; /* Animación suave al pasar el mouse */
            cursor: pointer;
            border: 3px solid transparent; /* Borde oculto por defecto */
        }

        .card:hover {
            transform: translateY(-10px); /* Sube un poco al pasar el mouse */
            border: 3px solid #40E0D0; /* Aparece el borde turquesa al pasar el mouse */
            box-shadow: 0 12px 20px rgba(64, 224, 208, 0.3);
        }

        /* --- ESTILO DE LAS IMÁGENES DENTRO DE LAS TARJETAS (Esto arregla el tamaño gigante) --- */
        .card img {
            width: 100%; /* La imagen ocupa todo el ancho de la tarjeta */
            height: 200px; /* Altura fija para que todas sean iguales */
            border-radius: 15px; /* Bordes redondeados en la imagen */
            object-fit: cover; /* Ajusta la imagen sin deformarla */
        }
