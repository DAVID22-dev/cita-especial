<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuestra Próxima Cita ❤️</title>
    <style>
        body {
            background-color: #e0f7fa; /* Fondo turquesa clarito */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            color: #008B8B; /* Texto turquesa oscuro */
            padding: 30px;
            margin: 0;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .container {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-top: 30px;
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 15px;
            width: 260px;
            box-shadow: 0 4px 15px rgba(0, 139, 139, 0.2);
            transition: transform 0.3s, border 0.3s;
            cursor: pointer;
            border: 3px solid transparent;
        }

        .card:hover {
            transform: scale(1.05);
            border: 3px solid #40E0D0; /* Borde turquesa al pasar el mouse */
        }

        .card img {
            width: 100%;
            border-radius: 10px;
            height: 180px;
            object-fit: cover; /* Esto hace que la imagen no se deforme */
        }

        #mensaje-final {
            display: none;
            margin-top: 40px;
            padding: 20px;
            background: #40E0D0;
            color: white;
            border-radius: 50px;
            font-size: 1.3em;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <h1>¡Hola Preciosa! ✨</h1>
    <p>¿A dónde vamos en nuestra siguiente cita?</p>
    <p><small>(Toca cualquier lugar para la música y elige tu opción)</small></p>

    <div class="container">
        <div class="card" onclick="elegir('una cena deliciosa en el Restaurante Coreano')">
            <img src="cena.jpg" alt="Cena">
            <h3>Restaurante Coreano 🥢</h3>
        </div>

        <div class="card" onclick="elegir('una tarde llena de arte y pintura')">
            <img src="arte.jpg" alt="Pintura">
            <h3>Tarde de Arte 🎨</h3>
        </div>

        <div class="card" onclick="elegir('un día de juegos y LEGO')">
            <img src="lego.jpg" alt="LEGO">
            <h3>Día de Juegos 🧱</h3>
        </div>
    </div>

    <div id="mensaje-final"></div>

    <audio id="musica-fondo" loop>
        <source src="musica.mp3" type="audio/mpeg">
    </audio>

    <script>
        function elegir(opcion) {
            // REEMPLAZA LAS X CON TU NÚMERO (Ej: 56912345678)
            const tuTelefono = ""; 
            
            const mensaje = document.getElementById('mensaje-final');
            mensaje.style.display = 'block';
            mensaje.innerHTML = "¡Me encanta! Avisándote por WhatsApp... ❤️";
            
            const textoWA = `¡Hola! Ya elegí nuestra cita: ¡Quiero ${opcion}! ✨`;
            const url = `https://wa.me/${tuTelefono}?text=${encodeURIComponent(textoWA)}`;

            setTimeout(() => {
                window.open(url, '_blank');
            }, 1500);
        }

        window.addEventListener('click', () => {
            const musica = document.getElementById('musica-fondo');
            musica.play().catch(e => console.log("Error con la música"));
        }, { once: true });
    </script>

</body>
</html>
