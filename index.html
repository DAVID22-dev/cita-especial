<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nuestra Próxima Cita ❤️</title>
    <style>
        body {
            background-color: #ffeef2;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            color: #d63384;
            padding: 50px;
        }

        .container {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-top: 30px;
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 15px;
            width: 250px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            transition: transform 0.3s;
            cursor: pointer;
        }

        .card:hover {
            transform: scale(1.05);
            border: 2px solid #ff4d6d;
        }

        .card img {
            width: 100%;
            border-radius: 10px;
            height: 180px;
            object-fit: cover;
        }

        h2 { font-size: 2em; }
        
        #mensaje-final {
            display: none;
            margin-top: 40px;
            font-size: 1.5em;
            font-weight: bold;
            color: #ff4d6d;
        }
    </style>
</head>
<body>

    <h1>¿Hola Preciosa! A dónde vamos en nuestra siguiente cita? ✨</h1>
    <p>Haz clic en cualquier lugar para activar la música y elige tu opción favorita:</p>

    <div class="container">
        <div class="card" onclick="elegir('una cena deliciosa!')">
            <img src="cena.jpg" alt="Cena">
            <h3>Restaurante Koreano</h3>
        </div>

        <div class="card" onclick="elegir('una tarde llena de arte y pintura')">
            <img src="arte.jpg" alt="Pintura">
            <h3>Tarde de Arte</h3>
        </div>

        <div class="card" onclick="elegir('una aventura construyendo algo juntos')">
            <img src="lego.jpg" alt="LEGO">
            <h3>Dia de juegos!</h3>
        </div>
    </div>

    <div id="mensaje-final"></div>

    <audio id="musica-fondo" loop>
        <source src="musica.mp3" type="audio/mpeg">
    </audio>

    <script>
        function elegir(opcion) {
            const mensaje = document.getElementById('mensaje-final');
            mensaje.style.display = 'block';
            mensaje.innerHTML = "¡Me encanta! Entonces prepárate para " + opcion + ". ❤️";
            
            // Efecto de confeti o alerta si prefieres
            alert("¡Cita confirmada!");
        }

        // Activar música al primer clic en la pantalla
        window.addEventListener('click', () => {
            const musica = document.getElementById('musica-fondo');
            musica.play();
        }, { once: true });
    </script>

</body>
</html>
